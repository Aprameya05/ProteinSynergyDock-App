name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install rdkit numpy pandas requests
          pip install torch --quiet
          pip install torch_geometric --quiet

      - name: Run test suite
        run: pytest tests/ -v --tb=short

      - name: Verify app.py compiles
        run: python -m py_compile app.py

      - name: Verify no invalid SMILES in drug database
        run: |
          python -c "
          from rdkit import Chem
          import core
          bad = [n for n,s in core.DRUG_SMILES_LOOKUP.items() if Chem.MolFromSmiles(s) is None]
          assert not bad, f'Invalid SMILES found: {bad}'
          print(f'All {len(core.DRUG_SMILES_LOOKUP)} drug SMILES validated successfully')
          "